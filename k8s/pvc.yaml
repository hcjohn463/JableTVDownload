# ============================================================
# PersistentVolumeClaim (PVC)
# 用途：給下載的影片提供持久化儲存空間
# ============================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jable-downloads-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce       # 單一 Node 讀寫
  resources:
    requests:
      storage: 50Gi       # 申請 50GB 儲存空間
  storageClassName: standard
